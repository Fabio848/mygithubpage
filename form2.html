<body>
     <style>
        nav{
            display: block;
        }
          body {
            display: block;
            justify-content: center;
            align-items: center;
            height: 2vh;
            margin: 0;
            background-color: #050803e3;
            
            
        }
        form {
            width: 900px;
            background-color: #24cd24;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(17, 17, 17, 0.753);
        }
        fieldset {
            border: 1px solid rgb(4, 4, 4);
            padding: 1px;
            margin: 0;
        }
        legend {
            font-weight: bolder;
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        textarea,
        input[type="date"] {
            width: calc(100% - 20px);
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .gender-group {
            margin-bottom: 10px;
        }
        .gender-group label {
            display: inline-block;
            margin-left: 10px;
        }
        input[type="radio"] {
            margin-left: 10px;
            vertical-align: middle;
        }
        input[type="submit"] {
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
     </style>
        

<form action="THANK YOU.html">
<h2>User personal information:</h2>

    <fieldset>
  <label for="name">Enter your full name:</label>
            <input type="text" id="name" name="name" required />
            <label for="email">Enter your email:</label>
            <input type="email" id="email" name="email" required />
            <label for="password">Enter your password:</label>
            <input type="password" id="password" name="pass" required />
            <label for="confirmPassword">Confirm your password:</label>
            <input type="password" id="confirmPassword" name="confirmPass" required />
            <label for="Phone number">Enter your SIM phone number:</label>
            <input type="Phone number" id="SIM Phone number" name="SIM Phone number" required />
            
            <label for="id number">Enter your id number:</label>
            <input type="id number" id="id number" name="id number" required />
              <label>Enter your gender:</label>
            <div class="gender-group">
                <input type="radio" name="gender" value="male" id="male" required />
                <label for="male">Male</label>
                <input type="radio" name="gender" value="female" id="female" />
                <label for="female">Female</label>
                <input type="radio" name="gender" value="others" id="others" />
                <label for="others">Others</label>
            </div>
            <label for="dob">Enter your Date of Birth:</label>
            <input type="date" id="dob" name="dob" required />
            <label for="address">Enter your Address:</label>
            <input id="address" name="address" required>


  <input type="submit" value="Submit">
    </fieldset>
</form>
 <!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
